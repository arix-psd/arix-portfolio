<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arix.psd | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            padding: 4rem 2rem;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 6rem auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            opacity: 0; 
            transform: translateY(20px);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            text-transform: lowercase;
        }

        p.bio {
            font-size: 1rem;
            color: #888888;
            max-width: 500px;
            line-height: 1.5;
            font-weight: 300;
        }

        .portfolio-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background-color: #0a0a0a;
            border: 1px solid #111111;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            opacity: 0; 
            transform: scale(0.95);
        }

        /* Image Frame */
        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1; 
            overflow: hidden;
            background-color: #111111;
            padding: 1rem;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%); 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), filter 0.4s ease;
            border-radius: 8px;
        }

        /* High-End Hover Effects */
        .project-card:hover .image-container img {
            transform: scale(1.05);
            filter: grayscale(100%);         }

        .project-card:hover {
            border-color: #333333;
        }

        /* Project Metadata */
        .project-info {
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .project-title {
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: -0.02em;
        }

        .project-category {
            font-size: 0.85rem;
            color: #666666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (max-width: 768px) {
            body { padding: 2rem 1rem; }
            header { margin-bottom: 4rem; }
            .portfolio-grid { grid-template-columns: 1fr; }
        }
    </style>

    <!-- Including GSAP and ScrollTrigger core files via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>
<body>

    <!-- Header Section -->
    <header id="portfolio-header">
        <h1>arix.psd</h1>
        <p class="bio">Albert Richardson &mdash; Specialising in Experimental Typography and Illustration. BA Hons Level 5 Graphic Design at LAU.</p>
    </header>

    <!-- Portfolio Main Grid Space -->
    <main class="portfolio-grid">

        <!-- PROJECT 1 -->
        <div class="project-card">
            <div class="image-container">
                <img src="experimental.jpg" alt="Experimental Typography Layout">
            </div>
            <div class="project-info">
                <span class="project-title">T.U.R.F</span>
                <span class="project-category">Campaign</span>
            </div>
        </div>

        <!-- PROJECT 2 -->
        <div class="project-card">
            <div class="image-container">
                <img src="Drift.png" alt="Drift App Project">
            </div>
            <div class="project-info">
                <span class="project-title">Drift App Interface</span>
                <span class="project-category">UI / UX</span>
            </div>
        </div>

        <!-- PROJECT 3 -->
        <div class="project-card">
            <div class="image-container">
                <img src="NEST.png" alt="NEST Brand Identity">
            </div>
            <div class="project-info">
                <span class="project-title">NEST Property Group</span>
                <span class="project-category">Branding</span>
            </div>
        </div>

        <!-- PROJECT 4 -->
        <div class="project-card">
            <div class="image-container">
                <img src="Strata.png" alt="Strata Visual Identity">
            </div>
            <div class="project-info">
                <span class="project-title">Strata</span>
                <span class="project-category">Web Design</span>
            </div>
        </div>

        <!-- PROJECT 5 -->
        <div class="project-card">
            <div class="image-container">
                <img src="beer.png" alt="Beer Campaign">
            </div>
            <div class="project-info">
                <span class="project-title">Beer Culture</span>
                <span class="project-category">Campaign</span>
            </div>
        </div>

        <!-- PROJECT 6 -->
        <div class="project-card">
            <div class="image-container">
                <img src="john lewis.jpg" alt="John Lewis Packaging">
            </div>
            <div class="project-info">
                <span class="project-title">John Lewis</span>
                <span class="project-category">Branding</span>
            </div>
        </div>



    </main>

    <!-- Animation Logic script -->
    <script>
        // Registering ScrollTrigger library to GSAP core
        gsap.registerPlugin(ScrollTrigger);

        // 1. Initial Header Reveal Page Load Animation
        gsap.to("#portfolio-header", {
            opacity: 1,
            y: 0,
            duration: 1.2,
            ease: "power4.out"
        });

        // 2. Scroll-Triggered Grid Stagger Reveal
        gsap.utils.toArray(".project-card").forEach((card) => {
            gsap.to(card, {
                opacity: 1,
                scale: 1,
                duration: 1,
                ease: "power3.out",
                scrollTrigger: {
                    trigger: card,
                    start: "top 85%", // Triggers animation when card top crosses 85% viewport height
                    toggleActions: "play none none none"
                }
            });
        });
    </script>
</body>
</html>
